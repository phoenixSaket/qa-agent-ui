<div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden transition-all duration-300" [ngClass]="isCollapsed ? '' : 'h-[600px]'">
    <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
        <h2 class="text-sm font-bold text-gray-800 flex items-center gap-2">
            <span class="text-purple-600">📚</span> Knowledge Base
        </h2>
        <div class="flex items-center gap-2">
            <button *ngIf="!isCollapsed" (click)="requestRefresh()" class="text-xs text-purple-600 hover:text-purple-800 bg-purple-50 hover:bg-purple-100 px-3 py-1.5 rounded-full font-medium transition-colors border border-purple-200">
                Fetch Latest Insights
            </button>
            <button (click)="toggleCollapse()" class="text-gray-400 hover:text-gray-600 focus:outline-none ml-2">
                <svg *ngIf="!isCollapsed" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                <svg *ngIf="isCollapsed" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
        </div>
    </div>

    <div *ngIf="!isCollapsed" class="p-6 overflow-y-auto flex-1 prose prose-sm prose-purple max-w-none text-gray-600">
        <div *ngIf="!markdownHtml()" class="text-center text-gray-400 mt-10 italic">
            Click 'Fetch Latest Insights' to view modular markdown files.
        </div>
        <div [innerHTML]="markdownHtml()"></div>
    </div>
</div>
